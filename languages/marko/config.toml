name = "Marko"
grammar = "marko"
path_suffixes = ["marko"]

# JS-style line comments in expression/concise positions; HTML comments in
# markup.
line_comments = ["// "]
block_comment = ["<!-- ", " -->"]

tab_size = 2
hard_tabs = false

autoclose_before = ";:.,=}])>` \t\n"

brackets = [
  { start = "<", end = ">", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "`", end = "`", close = true, newline = false, not_in = ["string", "comment"] },
]
