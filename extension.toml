id = "marko"
name = "Marko"
description = "Marko language support: syntax highlighting, embedded languages, and the Marko language server."
version = "0.1.0"
schema_version = 1
authors = ["Dylan Piercey <pierceydylan@gmail.com>"]
repository = "https://github.com/marko-js/zed"

[language_servers.marko]
name = "Marko Language Server"
languages = ["Marko"]

# Zed fetches and compiles the grammar from the tree-sitter-marko repo at
# `rev`; point it at a pushed commit or a release tag. For local development
# you can load the grammar from a checkout with a file:// URL, e.g.:
#   repository = "file:///Users/dpiercey/dev/marko-js/tree-sitter"
#   rev = "<a committed local sha>"
[grammars.marko]
repository = "https://github.com/marko-js/tree-sitter"
rev = "7fc673c5c26fb8190115aa9f54d7b744c73a824f"
