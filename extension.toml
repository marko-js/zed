id = "marko"
name = "Marko"
description = "Marko language support: syntax highlighting, embedded languages, and the Marko language server."
version = "0.1.0"
schema_version = 1
authors = ["Dylan Piercey <pierceydylan@gmail.com>"]
repository = "https://github.com/marko-js/zed"

[language_servers.marko]
name = "Marko Language Server"
languages = ["Marko"]

# Zed fetches and compiles the grammar from the marko-js/tree-sitter repo at
# `rev`, which must be a commit SHA. This pin is kept current with the latest
# published @marko/tree-sitter release by
# .github/workflows/update-tree-sitter.yml; the trailing comment on `rev`
# records the version that commit corresponds to. For local development you can
# load the grammar from a checkout with a file:// URL, e.g.:
#   repository = "file:///Users/dpiercey/dev/marko-js/tree-sitter"
#   rev = "<a committed local sha>"
[grammars.marko]
repository = "https://github.com/marko-js/tree-sitter"
rev = "7fb20382b9b0c97c8bdbceee0e0641bea11dd00f" # @marko/tree-sitter v0.2.0
